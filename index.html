<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percepcion-causalidad</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="index-script.js" defer></script>
  <link rel="stylesheet" href="index-style.css">
  <link rel="preload" as="image" href="img/logo.png">
  <link rel="preload" as="image" href="img/unam.png">
  <link rel="preload" as="image" href="img/paloma.png">
  <link rel="preload" as="image" href="img/poli.png">
  <style>
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    #loadingScreen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-wave {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      height: 60px;
    }

    .wave-bar {
      width: 10px;
      background: white;
      border-radius: 5px;
      animation: wave-animation 1.2s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }

    @keyframes wave-animation {
      0%, 100% { 
        height: 20px; 
        opacity: 0.6;
      }
      50% { 
        height: 55px; 
        opacity: 1;
      }
    }

    .loading-text {
      color: white;
      margin-top: 30px;
      font-size: 18px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      letter-spacing: 2px;
      animation: fade-text 1.5s ease-in-out infinite;
    }

    @keyframes fade-text {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    body.loading .container {
      opacity: 0;
    }

    body:not(.loading) .container {
      opacity: 1;
      transition: opacity 0.5s ease-in;
    }
  </style>
</head>
<body class="loading">
  <div id="loadingScreen">
    <div class="loader-wave">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <div class="loading-text">CARGANDO</div>
  </div>

  <div class="container">
    <div class="logo">
      <img src="img/logo.png" alt="Logo">
    </div>
    <h1>Bienvenido</h1>

    <form class="mb-4">
      <div class="form-group">
        <label for="name" class="section-title">Nombre:</label>
        <input type="text" id="name" class="form-control">
      </div>

      <div class="form-group">
        <label for="age" class="section-title">Edad:</label>
        <input type="number" id="age" class="form-control" min="1" max="120">
      </div>

      <div class="grupo-container">
        <label class="section-title">Selecciona un grupo:</label>
        <div class="groups-grid">
          <div class="group-card" data-group="unam">
            <img src="img/unam.png" class="card-img-top" alt="UNAM">
          </div>
          <div class="group-card" data-group="paloma">
            <img src="img/paloma.png" class="card-img-top" alt="Paloma">
          </div>
          <div class="group-card" data-group="ipn">
            <img src="img/poli.png" class="card-img-top" alt="IPN">
          </div>
        </div>
      </div>

      <button type="button" id="startBtn" disabled>INICIAR</button>
    </form>
  </div>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('hidden');
        document.body.classList.remove('loading');
      }, 500);
    });
  </script>
</body>
</html>
